<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create HOD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .container { max-width: 400px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2d3e50; }
        label { display: block; margin-top: 16px; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 24px; background: #2d3e50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1a2533; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center; margin-bottom: 24px;">
            <a href="https://www.lenovo.com/in/en/?Redirect=False" target="_blank">
                <img src="https://logos-world.net/wp-content/uploads/2022/07/Lenovo-Logo.png" alt="Lenovo Logo" style="height:100px;">
            </a>
        </div>
        <h2>Create HOD</h2>
        <form method="post" action="/submit-hod">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="contact_number">Contact Number (Give in 10 digits)</label>
            <input type="text" id="contact_number" name="contact_number" required>
            <label for="university_name">University Name</label>
            <input type="text" id="university_name" name="university_name" required>
            <label for="location">Location</label>
            <input type="text" id="location" name="location" required>
            <label for="departments">Departments (Comma separated)</label>
            <input type="text" id="departments" name="departments" required>
            <label for="registration_year">Registration Year</label>
            <input type="text" id="registration_year" name="registration_year" required>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
