{% if request.url.path != '/login' %}
<style>
    .topbar { 
        font-family: "Segoe UI", Arial, sans-serif; 
        display: grid; 
        grid-template-columns: 1fr auto 1fr; 
        align-items: center; 
        background: linear-gradient(90deg,#121c23,#1d2a36 55%, #121c23); 
        color:#fff; 
        padding: 10px 28px; 
        border-bottom: 2px solid #e53935; 
        box-shadow: 0 2px 8px rgba(0,0,0,0.35); 
        position: sticky; 
        top:0; 
        z-index: 1000; 
    }
    .topbar::after { 
        content:""; 
        position:absolute; 
        left:0; right:0; bottom:-2px; 
        height:2px; 
        background:linear-gradient(90deg,transparent,#e53935,transparent); 
        opacity:.6; 
    }
    .topbar .brand { 
        display:flex; 
        align-items:center; 
        gap:14px; 
        font-weight:600; 
        letter-spacing:.6px; 
        font-size:1.05rem; 
        filter: drop-shadow(0 2px 6px rgba(0,0,0,.35));
    }
    .topbar .brand a { 
        display:flex; align-items:center; gap:14px; 
        text-decoration:none; color:#fff; 
        position:relative;
    }
    .topbar .brand img { 
        height:40px; 
        display:block; 
        transition: transform .25s ease; 
    }
    .topbar .brand a:hover img { 
        transform: scale(1.06) rotate(-2deg); 
    }
    .topbar .actions { 
        justify-self: end; 
        display:flex; 
        align-items:center; 
        gap:14px; 
    }
    .btn-logout { 
        --c:#c0392b; 
        background: var(--c); 
        color:#fff; 
        text-decoration:none; 
        padding:8px 20px; 
        border-radius:6px; 
        font-size:14px; 
        font-weight:600; 
        letter-spacing:.4px; 
        box-shadow: 0 2px 6px rgba(0,0,0,.25); 
        position:relative; 
        overflow:hidden; 
        transition: background .25s, transform .25s; 
    }
    .btn-logout::before { 
        content:""; 
        position:absolute; 
        inset:0; 
        background:linear-gradient(120deg, rgba(255,255,255,.25), rgba(255,255,255,0)); 
        opacity:0; 
        transition:opacity .35s; 
    }
    .btn-logout:hover { 
        background:#e74c3c; 
        transform: translateY(-2px); 
    }
    .btn-logout:hover::before { opacity:1; }
    @media (max-width: 680px) { 
        .topbar { grid-template-columns: auto 1fr auto; padding:10px 14px; }
        .topbar .brand span { display:none; }
        .topbar .brand img { height:34px; }
        .btn-logout { padding:6px 14px; }
    }
</style>
<div class="topbar">
    <div></div>
    <div class="brand">
        <a href="/dashboard">
            <img src="https://logos-world.net/wp-content/uploads/2022/07/Lenovo-Logo.png" alt="Lenovo">
            <span>Internship Portal</span>
        </a>
    </div>
    <div class="actions">
        <a class="btn-logout" href="/logout">Logout</a>
    </div>
</div>
{% endif %}
