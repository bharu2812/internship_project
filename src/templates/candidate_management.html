<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candidate Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .header-gradient {
            width: 100%;
            /* background: linear-gradient(90deg, #e53935 0%, #e35d5b 100%); */
            padding: 32px 0 16px 0;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: #fff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        h2 {
            text-align: left;
            color: #2d3e50;
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 700;
        }
        .candidate-count {
            color: #e53935;
            font-weight: 600;
            margin-left: 12px;
            font-size: 1.1rem;
        }
        .search-bar {
            margin-bottom: 18px;
            display: flex;
            justify-content: flex-end;
        }
        .search-bar input {
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            width: 260px;
        }
        .action-icons {
            display: flex;
            justify-content: flex-end;
            gap: 18px;
            margin-bottom: 12px;
        }
        .action-icons button {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .action-icons button:hover {
            transform: scale(1.15);
        }
        .action-icons button span {
            font-size: 28px;
            color: #e53935;
        }
        .action-icons button[title]:hover::after {
            content: attr(title);
            position: absolute;
            top: 36px;
            right: 0;
            background: #fff;
            color: #e53935;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            z-index: 10;
        }
        .table-wrapper { position: relative; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
        }
        th, td {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }
        th {
            background: #f4f6fa;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        tr:hover td {
            background: #ffeaea;
        }
        .dialog {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .dialog.show { display: flex; }
        .dialog-content {
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            min-width: 350px;
        }
        .dialog-content label { display: block; margin-top: 12px; }
        .dialog-content input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .dialog-content .actions { margin-top: 24px; text-align: right; }
        .dialog-content button { padding: 8px 20px; margin-left: 8px; }
    </style>
</head>
<body>
{% include 'partials/nav.html' %}
    <div class="header-gradient">
        <a href="https://www.lenovo.com/in/en/?Redirect=False" target="_blank">
            <img src="https://logos-world.net/wp-content/uploads/2022/07/Lenovo-Logo.png" alt="Lenovo Logo" style="height:100px;">
        </a>
    </div>
    <div class="container">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
            <h2>Candidate Management <span class="candidate-count" id="candidateCount">(0)</span></h2>
            <div class="action-icons">
                <button title="Import CSV" onclick="importCSV()"><span>&#128190;</span></button>
                <button title="Export CSV" onclick="exportCSV()"><span>&#128462;</span></button>
                <button title="Add Record" onclick="showAddDialog()"><span>&#10133;</span></button>
            </div>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search candidates..." oninput="filterCandidates()">
        </div>
        <div class="table-wrapper">
            <table id="candidateTable">
                <thead>
                    <tr>
                        <th>Registration No</th>
                        <th>Email ID</th>
                        <th>Name</th>
                        <th>Branch</th>
                        <th>Semester</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Candidate rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>
    <div class="dialog" id="addDialog">
        <div class="dialog-content">
            <h3>Add Candidate Record</h3>
            <form id="addForm">
                <label for="regNo">Registration No</label>
                <input type="text" id="regNo" name="regNo" required>
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" required>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
                <label for="branch">Branch</label>
                <input type="text" id="branch" name="branch" required>
                <label for="semester">Semester</label>
                <input type="text" id="semester" name="semester" required>
                <div class="actions">
                    <button type="button" onclick="closeAddDialog()">Cancel</button>
                    <button type="submit">Add</button>
                </div>
            </form>
        </div>
    </div>

    <div class="dialog" id="editDialog">
        <div class="dialog-content">
            <h3>Edit Candidate Record</h3>
            <form id="editForm">
                <label for="editRegNo">Registration No</label>
                <input type="text" id="editRegNo" name="regNo" required readonly>
                <label for="editEmail">Email ID</label>
                <input type="email" id="editEmail" name="email" required>
                <label for="editName">Name</label>
                <input type="text" id="editName" name="name" required>
                <label for="editBranch">Branch</label>
                <input type="text" id="editBranch" name="branch" required>
                <label for="editSemester">Semester</label>
                <input type="text" id="editSemester" name="semester" required>
                <div class="actions">
                    <button type="button" onclick="closeEditDialog()">Cancel</button>
                    <button type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
    <input type="file" id="csvInput" accept=".csv" style="display:none" />
    <script>
    // Reload candidates from backend and update table
    async function reloadCandidates() {
        const response = await fetch('/candidates/');
        const data = await response.json();
        console.log('Candidates from backend:', data.candidates);
        const tableBody = document.getElementById('candidateTable').getElementsByTagName('tbody')[0];
        tableBody.innerHTML = '';
        if (Array.isArray(data.candidates)) {
            for (const candidate of data.candidates) {
                addCandidateRow(candidate.regNo, candidate.email, candidate.name, candidate.branch, candidate.semester);
            }
        }
        updateCandidateCount();
    }

    function showAddDialog() {
        // Reset form and set to add mode
        const dialog = document.getElementById('addDialog');
        const form = document.getElementById('addForm');
        form.reset();
        dialog.querySelector('h3').innerText = 'Add Candidate Record';
        dialog.querySelector('button[type="submit"]').innerText = 'Add';
        form.setAttribute('data-mode', 'add');
        dialog.classList.add('show');
    }
    function closeAddDialog() {
        document.getElementById('addDialog').classList.remove('show');
    }

    function showEditDialog({regNo, email, name, branch, semester}) {
        const dialog = document.getElementById('editDialog');
        const form = document.getElementById('editForm');
        form.editRegNo.value = regNo;
        form.editEmail.value = email;
        form.editName.value = name;
        form.editBranch.value = branch;
        form.editSemester.value = semester;
        dialog.classList.add('show');
    }
    document.getElementById('addForm').onsubmit = async function(e) {
        e.preventDefault();
        const regNo = this.regNo.value.trim();
        const email = this.email.value.trim();
        const name = this.name.value.trim();
        const branch = this.branch.value.trim();
        const semester = this.semester.value.trim();
        // Check for duplicates before adding
        const response = await fetch(`/check-candidate-duplicate?email=${encodeURIComponent(email)}&regNo=${encodeURIComponent(regNo)}`);
        const data = await response.json();
        if (data.duplicate) {
            alert('Duplicate candidate found (email or registration number already exists).');
            return;
        }
        // Send candidate data to backend for saving
        const saveResponse = await fetch('/add-candidate/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ regNo, email, name, branch, semester })
        });
        const saveData = await saveResponse.json();
        if (saveData.success) {
            // Trigger setup email for this candidate
            await fetch('/send-setup-emails/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emails: [email] })
            });
            // Reload candidates from backend to update table
            await reloadCandidates();
        } else {
            alert('Failed to save candidate to database.');
        }
        closeAddDialog();
        this.reset();
    };
    // Initial candidate list load from backend
    reloadCandidates();

    function addCandidateRow(regNo, email, name, branch, semester) {
        const table = document.getElementById('candidateTable').getElementsByTagName('tbody')[0];
        const row = table.insertRow();
        row.insertCell(0).innerText = regNo;
        row.insertCell(1).innerText = email;
        row.insertCell(2).innerText = name;
        row.insertCell(3).innerText = branch;
        row.insertCell(4).innerText = semester;
        // Action column with edit and delete icons
        const actionCell = row.insertCell(5);
        actionCell.innerHTML = `
            <span title="Edit" style="cursor:pointer;margin-right:10px;color:#2980b9;font-size:1.2em;" onclick="editCandidate(this)">&#9998;</span>
            <span title="Delete" style="cursor:pointer;color:#c0392b;font-size:1.2em;" onclick="deleteCandidate(this)">&#128465;</span>
        `;
        row.setAttribute('data-email', email);
        updateCandidateCount();
    }
    // Removed obsolete editModal variable
    function editCandidate(icon) {
        const row = icon.closest('tr');
        const regNo = row.cells[0].innerText.trim();
        const email = row.cells[1].innerText.trim();
        const name = row.cells[2].innerText.trim();
        const branch = row.cells[3].innerText.trim();
        const semester = row.cells[4].innerText.trim();
        showEditDialog({regNo, email, name, branch, semester});
    }
    function closeEditDialog() {
        document.getElementById('editDialog').classList.remove('show');
    }

    // Submit edit form via fetch and update table row
    document.getElementById('editForm').onsubmit = async function(e) {
        e.preventDefault();
        const regNo = this.editRegNo.value.trim();
        const email = this.editEmail.value.trim();
        const name = this.editName.value.trim();
        const branch = this.editBranch.value.trim();
        const semester = this.editSemester.value.trim();
        const payload = { regNo, email, name, branch, semester };
        const response = await fetch('/update-candidate/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.success) {
            // Update the table row in place
            const table = document.getElementById('candidateTable').getElementsByTagName('tbody')[0];
            for (let row of table.rows) {
                if (row.cells[0].innerText.trim() === regNo) {
                    row.cells[1].innerText = email;
                    row.cells[2].innerText = name;
                    row.cells[3].innerText = branch;
                    row.cells[4].innerText = semester;
                    break;
                }
            }
            alert('Candidate updated successfully.');
            closeEditDialog();
        } else {
            alert('Failed to update candidate.');
        }
    };
    async function deleteCandidate(icon) {
        if (!confirm('Are you sure you want to delete this candidate?')) return;
        const row = icon.closest('tr');
        const email = row.getAttribute('data-email');
        if (!email) return;
        // Call backend to delete
        const response = await fetch('/delete-candidate/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const result = await response.json();
        if (result.success) {
            row.remove();
            updateCandidateCount();
        } else {
            alert('Failed to delete candidate.');
        }
    }

    function updateCandidateCount() {
        const table = document.getElementById('candidateTable').getElementsByTagName('tbody')[0];
        document.getElementById('candidateCount').innerText = `(${table.rows.length})`;
    }

    function filterCandidates() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const table = document.getElementById('candidateTable').getElementsByTagName('tbody')[0];
        for (let row of table.rows) {
            let show = false;
            for (let cell of row.cells) {
                if (cell.innerText.toLowerCase().includes(input)) {
                    show = true;
                    break;
                }
            }
            row.style.display = show ? '' : 'none';
        }
    }

    function importCSV() {
        document.getElementById('csvInput').click();
    }
    document.getElementById('csvInput').onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        // Upload CSV to backend
        const formData = new FormData();
        formData.append('file', file);
        const uploadResponse = await fetch('/upload-csv/', {
            method: 'POST',
            body: formData
        });
        const uploadData = await uploadResponse.json();
        // Send setup emails only to new students
        if (uploadData.new_emails && uploadData.new_emails.length > 0) {
            await fetch('/send-setup-emails/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emails: uploadData.new_emails })
            });
        }
        // Reload candidates from backend to update table
        await reloadCandidates();
    };
    function exportCSV() {
        const table = document.getElementById('candidateTable');
        let csv = '';
        for (let row of table.rows) {
            let rowData = [];
            for (let cell of row.cells) {
                rowData.push(cell.innerText);
            }
            csv += rowData.join(',') + '\n';
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'candidates.csv';
        link.click();
    }
    // Initial candidate count update
    updateCandidateCount();
    </script>
</body>
</html>
