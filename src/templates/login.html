<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internship Program Portal - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .container { max-width: 400px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2d3e50; }
        label { display: block; margin-top: 16px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 24px; background: #2d3e50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1a2533; }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center; margin-bottom: 24px;">
            <a href="https://www.lenovo.com/in/en/?Redirect=False" target="_blank">
                <img src="https://logos-world.net/wp-content/uploads/2022/07/Lenovo-Logo.png" alt="Lenovo Logo" style="height:100px;">
            </a>
        </div>
        <h2>Internship Program Portal</h2>
        <form method="post" action="/login">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
            {% if error %}
            <div style="text-align:center; margin-top: 16px;">{{ error|safe }}</div>
            {% endif %}
        </form>
    </div>
</body>
</html>
