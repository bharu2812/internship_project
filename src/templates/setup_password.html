<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HOD Password Setup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .container { max-width: 400px; margin: 80px auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2d3e50; }
        label { display: block; margin-top: 16px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 24px; background: #2d3e50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1a2533; }
        .tooltip {
            display: inline-block;
            position: relative;
        }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 260px;
            background-color: #555;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 0;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -130px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center; margin-bottom: 24px;">
            <a href="https://www.lenovo.com/in/en/?Redirect=False" target="_blank">
                <img src="https://logos-world.net/wp-content/uploads/2022/07/Lenovo-Logo.png" alt="Lenovo Logo" style="height:100px;">
            </a>
        </div>
        <h2>Set Your Password</h2>
        {% if not success %}
        <form method="post" action="/setup-password">
            <label for="username">Username</label>
            <div class="tooltip">
                <input type="text" id="username" name="username" value="{{ username }}" required>
                <span class="tooltiptext">Choose a unique username. If already taken, you will see an error.</span>
            </div>
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button type="submit" id="setupBtn">Set Password</button>
            <script>
            document.addEventListener('DOMContentLoaded', function() {
                var setupBtn = document.getElementById('setupBtn');
                var usernameInput = document.getElementById('username');
                usernameInput.addEventListener('input', function() {
                    fetch('/check-username-unique?username=' + encodeURIComponent(usernameInput.value))
                        .then(response => response.json())
                        .then(data => {
                            if (!data.unique) {
                                setupBtn.disabled = true;
                                usernameInput.style.borderColor = '#c0392b';
                            } else {
                                setupBtn.disabled = false;
                                usernameInput.style.borderColor = '';
                            }
                        });
                });
            });
            </script>
            {% if error %}
            <div style="color:#c0392b; margin-top: 16px; text-align:center;">{{ error }}</div>
            {% endif %}
        </form>
        {% else %}
        <div style="margin-top:32px; text-align:center;">
            <h3 style="color:#2d3e50;">Thank you. Your password has been set.</h3>
            <p><a href="{{ login_url }}" style="color:#2980b9;font-weight:bold;">Click here to login</a></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
