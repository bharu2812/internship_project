<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .modal-container {
            max-width: 500px;
            min-width: 350px;
            margin: 40px auto;
            border-radius: 8px;
            background: transparent;
            position: relative;
            height: auto;
            padding: 32px 32px 32px 32px; /* Reduced right padding for balance */
            box-sizing: border-box;
        }

        h2 {
            text-align: left;
            color: #2d3e50;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-top: 18px;
            color: #2d3e50;
            font-weight: 500;
            padding-left: 2px;
        }
        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            max-width: 100%;
            padding: 10px 14px; /* Match skills dropdown */
            margin-top: 6px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            font-size: 1rem;
            background: #f9f9fb;
            transition: border 0.2s;
            box-sizing: border-box;
        }
        .dropdown {
            width: 100%;
            max-width: 100%;
            margin-bottom: 10px;
        }
        #skillsDropdownBtn {
            width: 100%;
            min-height: 44px;
            text-align: left;
            padding: 10px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            background: #f9f9fb;
            cursor: pointer;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            box-sizing: border-box;
        }
        #skillsDropdown {
            display: none;
            position: absolute;
            z-index: 1000;
            width: 100%;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 7px;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 10px 0;
            box-sizing: border-box;
        }
        .project-entry {
            background: #f7f8fa;
            border-radius: 16px;
            padding: 24px 32px 24px 32px; /* Match form container */
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            box-sizing: border-box;
        }
        .project-entry label {
            font-weight: 500;
            margin-top: 12px;
            display: block;
            padding-left: 2px;
        }
        .project-entry input,
        .project-entry textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px 14px; /* Match other fields */
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            font-size: 1rem;
            background: #fff;
            box-sizing: border-box;
        }
        .project-entry textarea {
            min-height: 60px;
            resize: vertical;
        }
        .project-entry .project-btn-row {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .project-entry .btn-save,
        .project-entry .btn-remove {
            flex: 1 1 0;
            width: 100%;
            padding: 12px 0;
            border-radius: 7px;
            font-weight: 600;
            font-size: 1.05rem;
            border: none;
            cursor: pointer;
            box-shadow: none;
            margin: 0;
        }
        .project-entry .btn-save {
            background: #2563eb;
            color: #fff;
        }
        .project-entry .btn-remove {
            background: #e53935;
            color: #fff;
        }
        .btn-add-project {
            width: 100%;
            padding: 12px 0;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 7px;
            font-weight: 600;
            font-size: 1.08rem;
            margin-top: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            box-shadow: none;
            transition: background 0.2s;
            display: block;
        }
        .btn-add-project:hover {
            background: #1746a2;
        }
    </style>
</head>
<body>
{% include 'partials/nav.html' %}
    <form method="post" action="/api/registrations" id="studentForm" class="modal-container">

        <h2 style="text-align:center;">Student Form</h2>

    <label for="university_registration_number">University Registration Number</label>
    <input type="text" id="university_registration_number" name="university_registration_number" required value="{{ regNo }}" {% if readonly_fields.regNo %}readonly{% endif %}>


    <label for="name">Name</label>
    <input type="text" id="name" name="name" required value="{{ name }}" {% if readonly_fields.name %}readonly{% endif %}>


    <label for="email">Email</label>
    <input type="text" id="email" name="email" required value="{{ email }}" {% if readonly_fields.email %}readonly{% endif %}>


    <label for="semester">Semester</label>
    <input type="text" id="semester" name="semester" required value="{{ semester }}" {% if readonly_fields.semester %}readonly{% endif %}>

    <label for="branch">Branch</label>
    <input type="text" id="branch" name="branch" required value="{{ branch }}" {% if readonly_fields.branch %}readonly{% endif %}>


    <label>Skills (select at least 3)</label>
    <div class="dropdown" style="position:relative; margin-bottom:10px;">
        <div id="skillsDropdownBtn" style="width:100%;min-height:44px;text-align:left;padding:10px 14px;border:1px solid #e0e0e0;border-radius:7px;background:#f9f9fb;cursor:pointer;display:flex;flex-wrap:wrap;align-items:center;gap:6px;"></div>
        <div id="skillsDropdown" style="display:none;position:absolute;z-index:1000;width:100%;background:#fff;border:1px solid #e0e0e0;border-radius:7px;max-height:220px;overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:10px 0;"></div>
    </div>
    <small style="color:#888;">Select at least 3 skills.</small>

    <label for="achievements">Achievements</label>
    <input type="text" id="achievements" name="achievements" placeholder="Achievements (comma separated)">

    <label for="certifications">Certifications</label>
    <input type="text" id="certifications" name="certifications" placeholder="Certifications (comma separated)">

    <label style="font-weight:600; margin-top:24px;">Projects</label>
    <div id="projects-container"></div>
    <button type="button" class="btn-add-project" onclick="addProject()">Add Project</button>

    <div style="display:flex; gap:16px; margin-top:32px;">
        <button type="submit" style="flex:1;">Save Changes</button>
        <button type="button" style="flex:1; background:#888;" onclick="window.parent.closeEditModal && window.parent.closeEditModal()">Cancel</button>
    </div>
    <script>
        // Dropdown with checkboxes for skills, chip-style display
        document.addEventListener('DOMContentLoaded', async function() {
            const dropdownBtn = document.getElementById('skillsDropdownBtn');
            const dropdown = document.getElementById('skillsDropdown');
            let selectedSkills = [];
            function renderChips() {
                dropdownBtn.innerHTML = '';
                if (selectedSkills.length === 0) {
                    const placeholder = document.createElement('span');
                    placeholder.style.color = '#888';
                    placeholder.textContent = 'Select skills';
                    dropdownBtn.appendChild(placeholder);
                } else {
                    selectedSkills.forEach(skill => {
                        const chip = document.createElement('span');
                        chip.textContent = skill;
                        chip.style = 'background:#e0e0e0;border-radius:12px;padding:4px 10px;margin:2px 2px 2px 0;display:inline-flex;align-items:center;font-size:0.95em;';
                        const close = document.createElement('span');
                        close.textContent = '×';
                        close.style = 'margin-left:8px;cursor:pointer;color:#c0392b;font-weight:bold;';
                        close.onclick = function(e) {
                            e.stopPropagation();
                            // Uncheck the corresponding checkbox
                            const cb = dropdown.querySelector('input[type="checkbox"][value="'+skill.replace(/"/g,'\\"')+'"]');
                            if (cb) cb.checked = false;
                            selectedSkills = selectedSkills.filter(s => s !== skill);
                            renderChips();
                        };
                        chip.appendChild(close);
                        dropdownBtn.appendChild(chip);
                    });
                }
            }
            try {
                const resp = await fetch('/api/skills-list');
                if (resp.ok) {
                    const data = await resp.json();
                    (data.skills || []).forEach(skill => {
                        const label = document.createElement('label');
                        label.style = 'display:block;padding:4px 12px;cursor:pointer;';
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.name = 'skills';
                        checkbox.value = skill;
                        checkbox.style.marginRight = '8px';
                        checkbox.addEventListener('change', function() {
                            selectedSkills = Array.from(dropdown.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
                            renderChips();
                        });
                        label.appendChild(checkbox);
                        label.appendChild(document.createTextNode(skill));
                        dropdown.appendChild(label);
                    });
                }
            } catch (e) { console.error('Failed to load skills list', e); }

            renderChips();
            dropdownBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            });
            document.addEventListener('click', function() {
                dropdown.style.display = 'none';
            });
        });
        // Require at least 3 skills selected
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            const checked = document.querySelectorAll('#skillsDropdown input[type="checkbox"]:checked');
            if (checked.length < 3) {
                alert('Please select at least 3 skills.');
                e.preventDefault();
            }
        });
    </script>
</form>

    <script>
function addProject() {
    const container = document.getElementById('projects-container');
    const idx = container.children.length;
    const projectEntry = document.createElement('div');
    projectEntry.className = 'project-entry';

    projectEntry.innerHTML = `
        <label>Project Title</label>
        <input type="text" name="project_title_${idx}" placeholder="Short, descriptive title" required>
        <label>Description</label>
        <textarea name="project_description_${idx}" placeholder="2-3 lines explaining the project" required></textarea>
        <label>Technology/Tools</label>
        <input type="text" name="project_tech_${idx}" placeholder="e.g., Python, Arduino (comma separated)" required>
        <label>Role/Contribution</label>
        <input type="text" name="project_role_${idx}" placeholder="What did you do?" required>
        <label>Link/Demo</label>
        <input type="text" name="project_link_${idx}" placeholder="GitHub, video, or live demo link">
        <div class="project-btn-row">
            <button type="button" class="btn-save" onclick="saveProject(this)">Save</button>
            <button type="button" class="btn-remove" onclick="removeProject(this)">Remove</button>
        </div>
    `;
    container.appendChild(projectEntry);
}

function removeProject(button) {
    button.closest('.project-entry').remove();
}

function saveProject(button) {
    const entry = button.closest('.project-entry');
    const title = entry.querySelector('input[name^="project_title_"]').value.trim();
    const description = entry.querySelector('textarea[name^="project_description_"]').value.trim();
    const technology = entry.querySelector('input[name^="project_tech_"]').value.trim();
    const role = entry.querySelector('input[name^="project_role_"]').value.trim();
    const link = entry.querySelector('input[name^="project_link_"]').value.trim();

    // Remove any previous error
    let errorDiv = entry.querySelector('.project-error');
    if (errorDiv) errorDiv.remove();

    if (!title || !description || !technology || !role || !link) {
        errorDiv = document.createElement('div');
        errorDiv.className = 'project-error';
        errorDiv.style = 'color:#e53935;margin-top:8px;font-size:0.98em;';
        errorDiv.textContent = 'Please fill all fields before saving this project.';
        entry.appendChild(errorDiv);
        return;
    }

    button.textContent = "Saved";
    button.disabled = true;
    button.style.opacity = "0.7";
}

document.getElementById('studentForm').addEventListener('submit', async function(e) {
    // Collect skills data
    const skills = Array.from(document.querySelectorAll('#skillsDropdown input[type="checkbox"]:checked')).map(cb => cb.value);

    // Collect projects data
    const projects = [];
    document.querySelectorAll('#projects-container .project-entry').forEach(entry => {
        projects.push({
            title: entry.querySelector('input[name^="project_title_"]').value,
            description: entry.querySelector('textarea[name^="project_description_"]').value,
            technology: entry.querySelector('input[name^="project_tech_"]').value,
            role: entry.querySelector('input[name^="project_role_"]').value,
            link: entry.querySelector('input[name^="project_link_"]').value,
        });
    });

    // Mandatory checks
    if (skills.length < 3) {
        alert('Please select at least 3 skills.');
        e.preventDefault();
        return;
    }
    if (projects.length < 1) {
        alert('Please add at least 1 project.');
        e.preventDefault();
        return;
    }

    const form = e.target;
    const formData = new FormData(form);
    formData.append('skills', JSON.stringify(skills));
    formData.append('projects', JSON.stringify(projects));

    e.preventDefault();
    const resp = await fetch(form.action, {
        method: 'POST',
        body: formData
    });
    if (resp.ok) {
        alert('Registration updated!');
        window.location.href = `/candidate-portal?regno=${document.getElementById('university_registration_number').value}`;
    } else {
        alert('Failed to update registration.');
    }
});
    </script>
</body>
</html>
