<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Candidate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6fa; }
        .container { max-width: 400px; margin: 40px auto; background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
        h2 { color: #2d3e50; margin-bottom: 18px; font-size: 1.5rem; font-weight: 700; text-align: center; }
        label { display: block; margin-top: 12px; }
        input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 18px; padding: 10px 24px; background: #e53935; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Candidate</h2>
    <form id="editCandidateForm">
        <label>Registration No:
            <input type="text" name="regNo" id="regNo" required />
        </label>
        <label>Email:
            <input type="email" name="email" id="email" required readonly />
        </label>
        <label>Name:
            <input type="text" name="name" id="name" required />
        </label>
        <label>Branch:
            <input type="text" name="branch" id="branch" required />
        </label>
        <label>Semester:
            <input type="text" name="semester" id="semester" required />
        </label>
        <button type="submit">Save Changes</button>
    </form>
</div>
<script>
// This script will be replaced by the parent page to fill values and handle submit
</script>
</body>
</html>
